<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Robotics Club Curriculum</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#fff;
    color:#111;
}

.container{
    max-width:760px;
    margin:auto;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;

    padding:48px 28px;
}

.logo{
    font-size:.85rem;
    font-weight:700;
    letter-spacing:.25em;
    text-transform:uppercase;
    margin-bottom:64px;
}

h1{
    font-size:3rem;
    font-weight:700;
    line-height:1.05;
    margin-bottom:18px;
}

.description{
    max-width:520px;
    color:#666;
    line-height:1.7;
    margin-bottom:56px;
}

.meta{
    display:grid;
    gap:12px;
    margin-bottom:56px;
}

.meta div{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    padding-bottom:10px;
    font-size:.95rem;
}

.download{
    width:max-content;
    text-decoration:none;
    color:#111;
    border:1px solid #111;
    padding:14px 26px;
    transition:.2s;
}

.download:hover{
    background:#111;
    color:#fff;
}

footer{
    margin-top:90px;
    color:#888;
    font-size:.85rem;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">ask_vd</div>

    <h1>Robotics Club Curriculum</h1>

    <p class="description">
        A practical roadmap covering Arduino programming, electronics,
        robotics, sensors, embedded systems and competition preparation.
    </p>

    <div class="meta">
        <div>
            <span>Format</span>
            <span>PDF</span>
        </div>

        <div>
            <span>Audience</span>
            <span>Club Members</span>
        </div>

        <div>
            <span>Duration</span>
            <span>Academic Year</span>
        </div>
    </div>

    <a href="curriculum.pdf" download class="download">
        Download Curriculum
    </a>

    <footer>
        Robotics Club
    </footer>

</div>

</body>
</html>
