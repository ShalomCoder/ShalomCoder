<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Robotics Club Curriculum</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Inter, Arial, sans-serif;
    background: #fff;
    color: #111;
}

.container {
    max-width: 850px;
    margin: auto;
    min-height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;

    padding: 40px 30px;
}

/* Brand */

.logo {
    position: absolute;
    top: 35px;
    left: 35px;

    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.03em;
}

/* Main */

h1 {
    font-size: clamp(48px, 8vw, 76px);
    line-height: 0.95;
    letter-spacing: -0.07em;
    max-width: 700px;
}

.subtitle {
    margin-top: 25px;
    max-width: 520px;

    color: #666;
    font-size: 17px;
    line-height: 1.7;
}

/* Info */

.info {
    margin-top: 55px;

    border-top: 1px solid #eaeaea;
    border-bottom: 1px solid #eaeaea;

    display: grid;
    grid-template-columns: repeat(3, 1fr);
}

.item {
    padding: 20px 0;
}

.item:not(:last-child) {
    border-right: 1px solid #eaeaea;
    padding-right: 20px;
}

.label {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .08em;
}

.value {
    margin-top: 8px;
    font-size: 15px;
    font-weight: 500;
}


/* Button */

.download {
    margin-top: 45px;

    display: inline-flex;
    width: fit-content;

    padding: 14px 25px;

    border: 1px solid #111;

    text-decoration: none;
    color: #111;

    font-size: 14px;
    font-weight: 500;

    transition: .2s;
}

.download:hover {
    background: #111;
    color: white;
}


/* Footer */

footer {
    position: absolute;
    bottom: 35px;
    left: 35px;

    color: #888;
    font-size: 13px;
}


@media(max-width:600px){

    .logo,
    footer {
        position: static;
    }

    .container {
        gap: 30px;
    }

    .info {
        grid-template-columns: 1fr;
    }

    .item:not(:last-child){
        border-right:none;
        border-bottom:1px solid #eaeaea;
    }

}

</style>

</head>


<body>

<div class="logo">
    ask_vd
</div>


<main class="container">

    <h1>
        Robotics Club<br>
        Curriculum
    </h1>


    <p class="subtitle">
        A practical learning roadmap covering Arduino,
        electronics, programming, sensors and robotics
        competition preparation.
    </p>


    <section class="info">

        <div class="item">
            <div class="label">
                Platform
            </div>

            <div class="value">
                Arduino UNO
            </div>
        </div>


        <div class="item">
            <div class="label">
                Level
            </div>

            <div class="value">
                SHS Robotics
            </div>
        </div>


        <div class="item">
            <div class="label">
                Format
            </div>

            <div class="value">
                PDF Document
            </div>
        </div>

    </section>


    <a class="download" href="robotics-curriculum.pdf" download>
        Download Curriculum →
    </a>


</main>


<footer>
    Robotics Club • 2026
</footer>


</body>
</html>
