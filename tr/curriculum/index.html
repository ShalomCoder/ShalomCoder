<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temasco Robotics Club</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Inter, sans-serif;
    background: #fff;
    color: #111;
}

.logo {
    position: fixed;
    top: 35px;
    left: 40px;

    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.04em;
}

main {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;

    padding: 40px;
}

h1 {
    font-size: clamp(55px, 10vw, 110px);
    line-height: .88;
    letter-spacing: -0.08em;

    max-width: 900px;
}

p {
    margin-top: 35px;

    max-width: 420px;

    font-size: 17px;
    line-height: 1.6;

    color: #666;
}


a {
    margin-top: 45px;

    width: fit-content;

    padding: 15px 28px;

    border: 1px solid #111;

    color: #111;
    text-decoration: none;

    font-size: 14px;
    font-weight: 500;

    transition: .2s;
}

a:hover {
    background: #111;
    color: white;
}


@media(max-width:600px){

    .logo {
        left:25px;
        top:25px;
    }

    main {
        padding:25px;
    }

}

</style>

</head>


<body>

<div class="logo">
    ask_vd
</div>


<main>

<h1>
    TEMASCO<br>
    ROBOTICS<br>
    CLUB
</h1>


<p>
    Engineering the future through robotics,
    programming and innovation.
</p>


<a href="robotics-curriculum.pdf" download>
    Download Curriculum →
</a>


</main>

</body>
</html>
