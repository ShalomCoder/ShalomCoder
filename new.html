<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shalom Agbongo — Full Stack, Native & Embedded Developer</title>

<link rel="icon" href="https://i.ibb.co/1JqfR53Q/Chat-GPT-Image-Jan-5-2026-03-30-55-PM.png">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

<style>
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  scroll-behavior: smooth;
  background: linear-gradient(270deg,#f9fafb,#eef2ff);
  background-size: 400% 400%;
  animation: bgMove 15s ease infinite;
}

@keyframes bgMove {
  0% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
  100% { background-position:0% 50%; }
}

/* SCROLL BAR */
#scrollBar {
  position: fixed;
  top:0;
  left:0;
  height:3px;
  background:#6366f1;
  width:0;
  z-index:9999;
}

/* CURSOR */
#cursor {
  position: fixed;
  width:10px;
  height:10px;
  background:#6366f1;
  border-radius:50%;
  pointer-events:none;
  transform: translate(-50%,-50%);
  z-index:9999;
}

/* LANDO-STYLE ANIMATION */
.reveal {
  opacity: 0;
  transform: translateY(60px) scale(0.98);
  filter: blur(10px);
  transition: all 0.9s cubic-bezier(0.22,1,0.36,1);
}

.reveal.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  filter: blur(0);
}

/* STAGGER */
.reveal.delay-1 { transition-delay: 0.1s; }
.reveal.delay-2 { transition-delay: 0.2s; }
.reveal.delay-3 { transition-delay: 0.3s; }
.reveal.delay-4 { transition-delay: 0.4s; }

/* CARDS */
.project-card {
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.project-card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 30px 60px rgba(0,0,0,0.15);
}

/* PROGRESS */
.progress-container {
  background:#e5e7eb;
  border-radius:999px;
  height:8px;
}
.progress-bar {
  height:8px;
  border-radius:999px;
  background: linear-gradient(90deg,#6366f1,#8b5cf6);
  width:0;
  transition: width 1s ease;
}

/* BUTTONS */
button:active { transform: scale(0.95); }

/* RIPPLE */
.ripple {
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.5);
  transform:scale(0);
  animation:ripple 0.6s linear;
}
@keyframes ripple {
  to { transform:scale(4); opacity:0; }
}
</style>
</head>

<body class="bg-gray-50 text-gray-900 px-1">

<div id="scrollBar"></div>
<div id="cursor"></div>

<!-- NAV -->
<nav class="sticky top-0 z-50 bg-white/60 backdrop-blur-md border-b border-gray-300 transition-transform">
  <div class="max-w-7xl mx-auto px-8 py-4 flex justify-between">
    <div class="text-xl font-bold">Shalom Agbongo</div>
    <div class="space-x-6">
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="p-16 text-center max-w-4xl mx-auto flex flex-col items-center space-y-8">
  <div class="reveal w-72 h-72 rounded-full overflow-hidden shadow-lg delay-1">
    <img src="https://i.ibb.co/1JqfR53Q/Chat-GPT-Image-Jan-5-2026-03-30-55-PM.png">
  </div>

  <h1 class="reveal text-5xl font-bold delay-2">Shalom (Kwame) Agbongo</h1>

  <p class="reveal text-xl text-gray-700 delay-3">
    Full stack developer, embedded systems & IoT enthusiast.
  </p>

  <div class="reveal flex space-x-3 delay-4">
    <button onclick="window.open('https://github.com/ShalomCoder')" class="bg-black text-white px-4 py-2 rounded-full">GitHub</button>
    <button onclick="window.open('https://linkedin.com')" class="bg-blue-600 text-white px-4 py-2 rounded-full">LinkedIn</button>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="max-w-4xl mx-auto space-y-10">

  <div class="project-card reveal p-8 bg-white rounded-2xl">
    <h3 class="text-2xl font-bold">WebOS</h3>
    <p>Browser-based OS</p>
    <div class="progress-container mt-2">
      <div class="progress-bar" data-width="60%"></div>
    </div>
  </div>

  <div class="project-card reveal p-8 bg-white rounded-2xl delay-2">
    <h3 class="text-2xl font-bold">WeaverBird</h3>
    <p>Web IDE</p>
    <div class="progress-container mt-2">
      <div class="progress-bar" data-width="40%"></div>
    </div>
  </div>

</section>

<script>
// CURSOR
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

// SCROLL BAR
window.addEventListener("scroll", () => {
  const h = document.body.scrollHeight - window.innerHeight;
  document.getElementById("scrollBar").style.width = (window.scrollY / h) * 100 + "%";
});

// NAV HIDE
let last = 0;
const nav = document.querySelector("nav");
window.addEventListener("scroll", () => {
  const current = window.scrollY;
  nav.style.transform = current > last ? "translateY(-100%)" : "translateY(0)";
  last = current;
});

// REVEAL (LANDO STYLE)
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add("show");
    }
  });
}, { threshold: 0.15 });

document.querySelectorAll(".reveal").forEach(el => obs.observe(el));

// PROGRESS ANIMATION
const barObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const bar = e.target;
      bar.style.width = bar.dataset.width;
    }
  });
});

document.querySelectorAll(".progress-bar").forEach(bar => {
  barObs.observe(bar);
});

// MAGNETIC BUTTONS
document.querySelectorAll("button").forEach(btn => {
  btn.style.position = "relative";
  btn.style.overflow = "hidden";

  btn.addEventListener("mousemove", e => {
    const r = btn.getBoundingClientRect();
    const x = e.clientX - r.left - r.width/2;
    const y = e.clientY - r.top - r.height/2;
    btn.style.transform = `translate(${x*0.2}px,${y*0.2}px)`;
  });

  btn.addEventListener("mouseleave", () => {
    btn.style.transform = "translate(0,0)";
  });

  btn.addEventListener("click", e => {
    const ripple = document.createElement("span");
    ripple.className = "ripple";

    const r = btn.getBoundingClientRect();
    ripple.style.left = e.clientX - r.left + "px";
    ripple.style.top = e.clientY - r.top + "px";

    btn.appendChild(ripple);
    setTimeout(()=>ripple.remove(),600);
  });
});
</script>

</body>
</html>
